services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./ecommerce-be
    ports:
      - "8080:8080"
    volumes:
      - ./ecommerce-be:/app
      - /app/node_modules # Không để node_modules đè lên máy thật
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=e-commerce
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - db

  frontend:
    build: ./dien-may-fe
    ports:
      - "5173:5173"
    volumes:
      - ./dien-may-fe:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data: